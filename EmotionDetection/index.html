<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emotion Detector</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <script>
        let analyze = () => {
            let textToAnalyze = document.getElementById("textToAnalyze").value;
            let xhttp = new XMLHttpRequest();
            xhttp.onreadystatechange = function() {
                if (this.readyState == 4 && this.status == 200) {
                    document.getElementById("system_response").innerHTML = xhttp.responseText;
                }
            };
            xhttp.open("GET", "emotionDetector?textToAnalyze=" + textToAnalyze, true);
            xhttp.send();
        }
    </script>
</head>
<body class="container mt-5">
    <div class="card shadow p-4">
        <h1 class="text-center mb-4">Emotion Detector</h1>
        <p class="lead">Enter the text you want to analyze for emotional content:</p>
        <textarea id="textToAnalyze" class="form-control mb-3" rows="4" placeholder="Type your text here..."></textarea>
        <button class="btn btn-primary w-100" onclick="analyze()">Analyze Text</button>
        <div id="system_response" class="mt-4 p-3 border rounded bg-light fw-bold text-primary">
            </div>
    </div>
</body>
</html>
