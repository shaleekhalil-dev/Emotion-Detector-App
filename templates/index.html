<!DOCTYPE html>
<html lang="ar" id="html-tag" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shalee & Shams AI</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background: #fdf6ff; font-family: 'Segoe UI', sans-serif; transition: 0.5s; }
        .card { border-radius: 40px; border: 8px solid #fff; box-shadow: 0 20px 50px rgba(180, 160, 200, 0.2); background: #ffffff; }
        .hero-text { color: #8e44ad; font-weight: 800; letter-spacing: -1px; }
        .btn-analyze { background: #a29bfe; border: none; border-radius: 20px; padding: 15px; font-weight: bold; color: white; transition: 0.3s; }
        .btn-analyze:hover { background: #6c5ce7; transform: scale(1.02); }
        .shalee-hint { color: #ff7675; cursor: pointer; font-weight: 500; font-size: 0.9rem; }
        .btn-lang { position: fixed; top: 20px; right: 20px; border-radius: 50px; background: #fff; border: 2px solid #a29bfe; color: #a29bfe; }
    </style>
</head>
<body>

<button class="btn btn-lang" onclick="toggleLang()" id="langBtn">English</button>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-7 text-center">
            <div class="card p-5">
                <h1 id="title" class="hero-text mb-3">محلل شعلي الذكي</h1>
                <p id="hint" class="shalee-hint mb-4" onclick="fillHint()">اسألني سؤال أنا شعلي.. وممكن شموسة تجاوبك إذا أنا بعرفش! 💡</p>
                
                <textarea id="textToAnalyze" class="form-control mb-4 shadow-sm border-0 bg-light" rows="3" style="border-radius:20px;" placeholder="أكتب هنا..."></textarea>
                
                <button class="btn btn-analyze w-100 shadow" onclick="analyze()" id="btnText">حلل الآن 🚀</button>
                
                <div id="system_response" class="mt-4 p-4 rounded-4 bg-light text-dark d-none fw-bold" style="border: 2px dashed #a29bfe;"></div>
            </div>
            <p class="mt-4 text-muted small">Made with Love by Shalee Khalil & Shams Vibes</p>
        </div>
    </div>
</div>

<script>
    let currentLang = 'ar';
    function toggleLang() {
        const html = document.getElementById("html-tag");
        const btn = document.getElementById("langBtn");
        const title = document.getElementById("title");
        const btnText = document.getElementById("btnText");
        const hint = document.getElementById("hint");
        const input = document.getElementById("textToAnalyze");

        if (currentLang === 'ar') {
            html.dir = "ltr";
            btn.innerText = "عربي";
            title.innerText = "Shalee AI Monitor";
            hint.innerText = "Ask Shalee a question.. Shams might reply if I don't know! 💡";
            btnText.innerText = "ANALYZE";
            input.placeholder = "Type here...";
            currentLang = 'en';
        } else {
            html.dir = "rtl";
            btn.innerText = "English";
            title.innerText = "محلل شعلي الذكي";
            hint.innerText = "اسألني سؤال أنا شعلي.. وممكن شموسة تجاوبك إذا أنا بعرفش! 💡";
            btnText.innerText = "حلل الآن 🚀";
            input.placeholder = "أكتب هنا...";
            currentLang = 'ar';
        }
    }

    function analyze() {
        let text = document.getElementById("textToAnalyze").value;
        let responseDiv = document.getElementById("system_response");
        if(!text.trim()) return;
        responseDiv.classList.remove("d-none");
        responseDiv.innerHTML = "🔍 ...";
        fetch(`/emotionDetector?textToAnalyze=${encodeURIComponent(text)}&ui_lang=${currentLang}`)
            .then(res => res.text()).then(data => responseDiv.innerHTML = data);
    }

    function fillHint() {
        document.getElementById("textToAnalyze").value = currentLang === 'ar' ? "شو بتشتغل؟" : "What is your job?";
    }
</script>
</body>
</html>
